phases:
  install:
    runtime-versions:
      python: 3.8

  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/m0f1n0m5
        

  build:
    commands:
      - echo Build started
      - docker pull public.ecr.aws/m0f1n0m5/maven:3.9.6-eclipse-temurin-17
      - docker tag public.ecr.aws/m0f1n0m5/maven:3.9.6-eclipse-temurin-17 maven:3.9.6-eclipse-temurin-17
      - docker pull public.ecr.aws/m0f1n0m5/eclipse-temurin:17-jre-jammy
      - docker tag public.ecr.aws/m0f1n0m5/eclipse-temurin:17-jre-jammy eclipse-temurin:17-jre-jammy
      - mvn -DskipTests clean install
      - docker build -t spc:0.1 .
      - docker image ls
      - docker run -d --name spc-app -p 8888:8080 spc:0.1
      - docker ps
      - ip r 
      # - docker build -t spc-public-repo .
      # - docker tag spc-public-repo:latest public.ecr.aws/m0f1n0m5/spc-public-repo:latest
  post_build:
    commands:
      # - echo Pushing Docker image
      # - docker push public.ecr.aws/m0f1n0m5/spc-public-repo:latest
      - echo Build completed
