name: Passing variables and artifacts
on: workflow_dispatch

jobs:
  deploy:
     runs-on: ubuntu-latest
     outputs:
        my_shared_var: ${{ steps.set_var.my_value }}
     steps:
       - name: Generate the Value
         id: set-var
         run: echo "my_value=HellowFromDeployJob" >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
       - name: Printing The Value
         run: |
           echo "The value received is {{ needs.deploy.outputs.my_shared_var }}"

  build_job:
      runs-on: ubuntu-latest
      steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: create a dummy build asset
          run: |
            mkdir -p build_output
            echo "Build Payload Data" > build_output/app.bin

        - name: Upload The asset
          uses: actions/upload-artifact@v4
          with:
            name: compiled-binary-asset
            path: build_output/app.bin

  deploy_job:
      runs-on: ubuntu-latest
      needs: build_job
      steps:
        - name: Download the asset
          uses: actions/download-artifact@v4
          with:
            name: compiled-binary-asset
            path: extracted_output

        - name: Verify Received File
          run: cat extracted_output/app.bin
