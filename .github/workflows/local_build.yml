name: Spring App Local Artifact Build And Image Build Push Demo
on: workflow_dispatch

jobs:
  build_and_push:
      runs-on: ubuntu-latest
      steps:
        - name: Code CheckOut
          uses: actions/checkout@v4

        - name: Build Artifact
          run: mvn -DskipTests clean install

        - name: Build Docker Image
          run: docker build -t spc:0.1 .
