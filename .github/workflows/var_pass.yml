name: Passing_Things_Between_Two_Jobs
on: workflow_dispatch

jobs:
  server:
     runs-on: ubuntu-latest
     outputs:
        my_var: ${{ steps.rslt.outputs.msg }}
     steps:
      - id: rslt
        run: echo "msg=Hellow" >> "GITHUB_OUTPUT"
  
  client:
     runs-on: ubuntu-latest
     needs: server
     steps:
       - run: echo "The Variable was ${{ needs.server.outputs.my_var }}" 
