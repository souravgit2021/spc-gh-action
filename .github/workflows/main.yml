name: demo spring app github action workflow
on: workflow_dispatch

jobs:
  build-and-test:
       runs-on: ubuntu-latest
       env:
         MY_VAR: "Hellow World"
       steps:
          - name: checkout code
            uses: actions/checkout@v4
        
          - name: build code
            run: mvn clean install

          - name: test code
            run: mvn test

          - name: Local Variable Print Test
            run: echo "The Value is $MY_VAR"

          - name: Repo Variable Print test
            run: echo "The Repo Variable is "${{vars.Name}}""

          - name: Archive Production Artifacts
            uses: actions/upload-artifact@v4
            with:
              name: dist-files
              path: target/*.jar

          - name: Download archived artifacts
            uses: actions/download-artifact@v4
            with:
              name: dist-files
              path: download-files/
          - run: ls download-files/
          
