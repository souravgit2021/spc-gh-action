name: demo-spc-build-workflow
on: [workflow_dispatch]
jobs:
  say-hello:
      runs-on: ubuntu-latest
      steps:
        - name: Greetings
          run: echo "Hellow World"
   
  Code:
    runs-on: ubuntu-latest
    steps:
      - name: getting the Code
        uses: actions/checkout@v4

  build:
    needs: Code
    runs-on: ubuntu-latest
    steps:
      - name: build the Code
        run: mvn install
